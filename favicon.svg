<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="10" y1="6" x2="58" y2="64" gradientUnits="userSpaceOnUse">
            <stop stop-color="#17282E" />
            <stop offset="1" stop-color="#365862" />
        </linearGradient>

        <linearGradient id="drop" x1="32" y1="30" x2="32" y2="52" gradientUnits="userSpaceOnUse">
            <stop stop-color="#D4E3E6" />
